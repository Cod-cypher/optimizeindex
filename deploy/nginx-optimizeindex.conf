# /etc/nginx/sites-available/optimizeindex.conf
# Certbot will add the SSL server block automatically when you run:
#   certbot --nginx -d optimizeindex.com -d www.optimizeindex.com

server {
    listen 80;
    listen [::]:80;
    server_name optimizeindex.com www.optimizeindex.com;

    # Node app started by PM2 (PORT in ecosystem.config.cjs)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Long cache for hashed build assets
    location /assets/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
